<!--
Vyčesáno.cz – kód do ZÁHLAVÍ (Shoptet administrace → Vzhled a obsah →
Editor → HTML kód → Záhlaví / před </head>)

Release v31 – redesign (v30) + patička v externích souborech:
  Shoptet pole mají limit 8192 znaků – zelená patička a sekce
  „Co hledáte" se proto vkládají z vz-footer.css + vz-footer.js.
  Pole ZÁPATÍ zůstává prázdné; při novém releasu se mění jen tenhle
  kód (přepsat @v31 na nový tag).

  Failsafe: třídu html.vz-ready nastavuje inline skript níže; watchdog
  ji odebere, když se custom hlavička nevloží (výpadek JS/CDN) –
  nativní Shoptet navigace pak zůstane viditelná a web použitelný.

  Záměrně tu NENÍ <link rel="canonical"> ani <meta name="description">
  (dřívější verze je vkládala globálně – canonical mířil z každé
  stránky na titulku = vážná SEO chyba; Shoptet si obojí generuje sám).
-->

<!-- Vycesano.cz – HEAD v31 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="//cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Písmo (latin-ext kvůli češtině) -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">

<!-- Custom hlavička se smí skrýt jen když poběží JS (watchdog níže) -->
<script>document.documentElement.classList.add('vz-ready');</script>

<!-- design tokens – musí být první -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/zukysevents-dot/vycesano-shoptet@v31/tokens.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/zukysevents-dot/vycesano-shoptet@v31/homepage-hero-v2.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/zukysevents-dot/vycesano-shoptet@v31/vz-footer.css">
<!-- redesign vrstva – musí být poslední -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/zukysevents-dot/vycesano-shoptet@v31/vz-redesign.css">

<script src="https://cdn.jsdelivr.net/gh/zukysevents-dot/vycesano-shoptet@v31/header.js" defer></script>
<script src="https://cdn.jsdelivr.net/gh/zukysevents-dot/vycesano-shoptet@v31/product.js" defer></script>

<!-- patička + sekce „Co hledáte" (markup se vkládá JS-em, viz komentář) -->
<script src="https://cdn.jsdelivr.net/gh/zukysevents-dot/vycesano-shoptet@v31/vz-footer.js" defer></script>

<!-- Watchdog: když se do 2,5 s po načtení nevloží custom hlavička,
     vrať nativní Shoptet navigaci (odebráním html.vz-ready) -->
<script>
window.addEventListener('load',function(){
  setTimeout(function(){
    if(!document.getElementById('vz-custom-header')){
      document.documentElement.classList.remove('vz-ready');
    }
  },2500);
});
</script>
