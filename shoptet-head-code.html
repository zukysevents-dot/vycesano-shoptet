<!--
Vyčesáno.cz – kód do ZÁHLAVÍ (Shoptet administrace → Vzhled a obsah →
Editor → HTML kód → Záhlaví / před </head>)

Release v30 – redesign:
  + písmo Manrope (Google Fonts, latin-ext)
  + soubory pinnuté na git TAG v30 (immutable – budoucí commity do main
    už produkci samovolně nezmění; nový release = nový tag + úprava URL)
  + failsafe: třídu html.vz-ready nastavuje inline skript níže; watchdog
    ji odebere, když se custom hlavička nevloží (výpadek JS/CDN) –
    nativní Shoptet navigace pak zůstane viditelná a web použitelný
  – ODSTRANĚNO: brand-banner.css, aaa-logo-kill.css (mrtvý kód),
    inline skript s SVG brand kartami (nahrazeno kategorie kartami v hero),
    reviews.js (smyšlené recenze -> vz-trust.js s ověřitelnými sliby)
  – ODSTRANĚNO: <link rel="canonical"> a <meta name="description">
    (duplikovaly Shoptet – canonical mířil z KAŽDÉ stránky na titulku,
    což je vážná SEO chyba; Shoptet si obojí generuje sám a správně)
-->

<!-- Vycesano.cz – HEAD v30 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="//cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Písmo (latin-ext kvůli češtině) -->

<!-- Custom hlavička se smí skrýt jen když poběží JS (watchdog níže) -->
<script>document.documentElement.classList.add('vz-ready');</script>

<!-- Watchdog: když se do 2,5 s po načtení nevloží custom hlavička,
     vrať nativní Shoptet navigaci (odebráním html.vz-ready) -->
<script>
window.addEventListener('load',function(){
  setTimeout(function(){
    if(!document.getElementById('vz-custom-header')){
      document.documentElement.classList.remove('vz-ready');
    }
  },2500);
});
</script>
