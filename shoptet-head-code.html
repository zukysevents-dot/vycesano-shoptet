<script>
(function(){
function run(){
var h=document.querySelector('.vz-brand-hero');if(!h)return;
var old=document.getElementById('vz-brand-spotlight-logos');if(old)old.remove();
if(document.getElementById('vz-clean-right-brand-cards'))return;
var b=document.createElement('div');b.id='vz-clean-right-brand-cards';
b.innerHTML='<a href="/vyhledavani/?string=Beeztees"><span class="vz-clean-logo vz-logo-beeztees"></span><small>Doplňky, hračky a vybavení ›</small></a><a href="/vyhledavani/?string=PetSafe"><span class="vz-clean-logo vz-logo-petsafe"></span><small>Chytré produkty pro mazlíčky ›</small></a><a href="/vyhledavani/?string=Animology"><span class="vz-clean-logo vz-logo-animology"></span><small>Kosmetika a péče o srst ›</small></a>';
var l=h.querySelector('.vz-brand-hero__logos');if(l)h.insertBefore(b,l);else h.appendChild(b);
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',run);else run();
window.addEventListener('load',run);
setTimeout(run,300);setTimeout(run,1000);setTimeout(run,2500);
})();
</script>
